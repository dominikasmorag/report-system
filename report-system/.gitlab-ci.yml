image: maven:3.9.6-eclipse-temurin-21

stages:
  - gcp-test
  - test
  - build-jar
  - docker-build-nginx
  - docker-build-app


gcp_auth_test:
  stage: gcp-test
  image: google/cloud-sdk:slim

  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com

  script:

    - echo "$GITLAB_OIDC_TOKEN" > /tmp/gitlab_token

    - gcloud iam workload-identity-pools create-cred-config \
      projects/200923071624/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab \
      --service-account=gitlab-ci@project-d22036bc-1bd7-43bf-a55.iam.gserviceaccount.com \
      --credential-source-file=/tmp/gitlab_token \
      --output-file=/tmp/creds.json

    - gcloud auth login --cred-file=/tmp/creds.json

    - gcloud auth list

unit_tests:
  stage: test
  before_script:
    - cd report-system
  script:
    - mvn test

build_jar:
  stage: build-jar
  before_script:
    - echo buildddd
    - cd report-system
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - report-system/target/*.jar

build_app_image:
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  stage: docker-build-app
  before_script:
    - cd report-system
  script:
    - docker build -t spring-app .

build_nginx_image:
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  stage: docker-build-nginx
  before_script:
    - cd report-system/nginx
  script:
    - docker build -t nginx-image .
    - echo sth