<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Report app demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1 class="display-1 text-light">
    Simple Report API - Użytkownik zalogowany
</h1>


<section class="dashboard py-5">
    <div class="container">

        <div class="dashboard-header d-flex justify-content-between align-items-center mb-5">
            <div>
                <p class="text-uppercase small text-secondary mb-2">
                    Admin panel
                </p>

                <h1 class="dashboard-title">
                    Report Management
                </h1>

                <p class="text-secondary mb-0">
                    Zarządzaj zgłoszeniami użytkowników
                </p>
            </div>

            <button class="btn btn-primary px-4 py-0" onclick="loadReports()">
                Załaduj zgłoszenia
            </button>
        </div>

        <div class="card dashboard-card p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="table-title mb-1 text-light">Zgłoszenia</h2>
                    <p class="text-secondary small mb-0">
                        Lista wszystkich zgłoszeń w systemie
                    </p>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table custom-table align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tytuł</th>
                        <th>Opis</th>
                        <th>Status</th>
                        <th>Priorytet</th>
                        <th>Użytkownik</th>
                        <th>Data</th>
                    </tr>
                    </thead>

                    <tbody id="tableBody">

                    </tbody>
                </table>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

<script>
    async function loadReports() {
        const token = localStorage.getItem("token");
        const response = await fetch("/api/reports", {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        console.log(response);
        const data = await response.json();

        console.log(data);

        tableBody.innerHTML = '';

        data.content.forEach(report => {
            const row = document.createElement('tr');

            row.innerHTML = `
            <td>${report.id}</td>
            <td>${report.title}</td>
            <td>${report.description}</td>
            <td>${report.reportStatus}</td>
            <td>${report.reportPriority}</td>
            <td>${report.username}</td>
            <td>${report.createdAt}</td>
            `;

            tableBody.appendChild(row);
        });

    }
</script>

</body>

</html>
