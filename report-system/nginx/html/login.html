<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Report app demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

<h1 class="display-1 text-light">
    <p>Simple Report API - logowanie</p>
</h1>


<section class="py-5">
    <div class="container">
        <div class="row gx-4">

            <div class="col">

            </div>

            <div class="col">
                <div class="card px-5 py-4 h-100 text-light">
                    <div class="row">
                        <p class="h2 text-center pb-2 mb-4">Logowanie</p>
                    </div>
                    <input id="login" class="form-control mb-4" type="text" placeholder="Login...">
                    <input id="password" class="form-control mb-4" type="password" placeholder="********">
                    <button onclick="login()"
                       class="col-8 border btn btn-primary btn-login text-light d-flex align-items-center justify-content-center m-auto">Zaloguj
                        się</button>
                </div>
            </div>

            <div class="col">

            </div>

        </div>
        <div class="row mt-5">
            <div class="col-4"></div>
            <div class="col-1"></div>
            <div class="col-4"></div>

        </div>
    </div>


</section>
<style>
    body {
        background-color: #0f172a;
    }

    .card {
        border: 1px solid #38bdf8;
        border-radius: 20px;
        background: #1e293b;

        box-shadow:
            0 4px 20px #38bff826;
    }

    .container {
        max-width: 80vw;
    }

    .btn {
        height: 40px;
        border-radius: 12px;
    }

    .btn-primary {
        font-size: 24px;
        background-color: #0a6a94;
    }

    .btn-primary:hover {
        background-color: #38bdf8;
    }

    .btn-login {
        margin-top: 20px;
        font-size: 18px;
    }

    .form-control {
        width: 70%;
        margin: auto;
    }
</style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script>
    async function login() {
        const username = document.getElementById("login").value;
        const password = document.getElementById("password").value;

        const response = await fetch("/api/users/login", {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                username: username,
                password: password
            })
        });
        if (response.ok) {
            const data = await response.json();
            localStorage.setItem("token", data.token);
            if(data.role == "ADMIN") {
                window.location.href = "/admin-dashboard.html"
            } else {
            window.location.href = "/user-dashboard.html";
            }
        } else {
            alert("Nieprawidłowy login lub hasło");
        }
    }
</script>
</body>

</html>
